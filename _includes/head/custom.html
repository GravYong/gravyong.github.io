<!-- start custom head snippets -->

<!-- Theme preference: apply before paint to avoid flash -->
<script>
  (function() {
    try {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.setAttribute('data-theme', t);
      }
    } catch (e) { /* ignore (private mode, etc.) */ }
  })();
</script>

{% if page.mathjax %}
<!-- MathJax 3 (async, loaded only on pages with mathjax: true) -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      tags: 'ams'
    },
    svg: { fontCache: 'global' }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}
{% if page.jsxgraph %}
<!-- JSXGraph -->
<script type="text/javascript" src="{{ site.url }}/assets/js/vendor/jsxgraphcore.js"></script>
<link rel="stylesheet" href="{{ site.url }}/assets/css/vendor/jsxgraph.css">
{% endif %}
{% if page.introjs %}
<!-- Intro.js -->
<script type="text/javascript" src="{{ site.url }}/assets/js/vendor/intro.min.js"></script>
<link rel="stylesheet" href="{{ site.url }}/assets/css/vendor/introjs.min.css">
{% endif %}
<!-- Academicons -->
<link rel="stylesheet" href="{{ site.url }}/assets/css/academicons.min.css"/>

<!-- end custom head snippets -->
